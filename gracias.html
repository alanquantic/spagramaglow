<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4F1JYEGVYQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-4F1JYEGVYQ');
    </script>
    <title>Compra confirmada | SPAGRAMA GlowAge</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#eef1f4" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="status-page">
      <div class="status-shell">
        <a class="brand" href="/" aria-label="SPAGRAMA, ir al inicio">
          <img class="brand-logo" src="logo.png" alt="SPAGRAMA" />
        </a>
        <section class="status-card">
          <p class="eyebrow">Compra confirmada</p>
          <h1>Tu ritual GlowAge está en marcha.</h1>
          <p>
            Gracias por comprar en SPAGRAMA. Stripe confirmó tu pago y te
            enviaremos los detalles de tu pedido por correo.
          </p>
          <a class="button button-primary" href="/">Volver al sitio</a>
        </section>
      </div>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var sessionId = params.get("session_id");
        var quantity = Number.parseInt(params.get("qty"), 10);

        if (!sessionId) {
          return;
        }

        // Evita duplicar la conversión si el cliente recarga la página.
        var storageKey = "spagrama_purchase_" + sessionId;
        try {
          if (window.localStorage.getItem(storageKey)) {
            return;
          }
          window.localStorage.setItem(storageKey, "1");
        } catch (error) {
          // localStorage no disponible; se envía el evento de todas formas.
        }

        var validQuantity = Number.isInteger(quantity) && quantity > 0 ? quantity : 1;

        gtag("event", "purchase", {
          transaction_id: sessionId,
          currency: "MXN",
          value: validQuantity * 299,
          shipping: 0,
          items: [
            {
              item_id: "glowage-150ml",
              item_name: "GlowAge 150 ml",
              item_brand: "SPAGRAMA",
              price: 299,
              quantity: validQuantity,
            },
          ],
        });
      })();
    </script>
  </body>
</html>
